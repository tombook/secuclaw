<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phase 1 · SecuClaw 首次引导气泡（3 步）</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background: #0a0f1a;
      color: #e2e8f0;
    }
    /* 背景：模糊的指挥台 */
    .bg {
      position: fixed; inset: 0;
      filter: blur(4px) brightness(0.5);
      pointer-events: none;
      background:
        linear-gradient(135deg, #0a0f1a, #0d1320);
    }
    .bg-grid {
      position: fixed; inset: 0;
      display: grid;
      grid-template-columns: 240px 1fr;
      grid-template-rows: 48px 1fr;
      filter: blur(4px) brightness(0.5);
      pointer-events: none;
    }
    .bg-side { background: #0d1320; }
    .bg-main { background: #0a0f1a; padding: 20px; }
    .bg-card {
      background: #111827; border: 1px solid #1e293b;
      border-radius: 8px; height: 100px; margin-bottom: 12px;
    }
    /* ─── 引导卡片（居中）─── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .guide {
      width: 520px;
      background: #111827; border: 1px solid #334155;
      border-radius: 12px; padding: 28px 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }
    .guide-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .guide-greeting { font-size: 18px; font-weight: 700; }
    .guide-greeting span { color: #00d4ff; }
    .skip-btn {
      background: none; border: none; color: #64748b;
      font-size: 12px; cursor: pointer; font-family: inherit;
    }
    .skip-btn:hover { color: #94a3b8; }
    .guide-sub { font-size: 13px; color: #94a3b8; margin-bottom: 20px; }
    .step-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
    .step-text { font-size: 11px; color: #64748b; }
    .step-progress { flex: 1; height: 4px; background: #1e293b; border-radius: 2px; overflow: hidden; }
    .step-fill { height: 100%; background: linear-gradient(90deg, #00d4ff, #a855f7); border-radius: 2px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: #cbd5e1; margin-bottom: 6px; }
    .form-input, .form-select {
      width: 100%; padding: 10px 12px; background: #0f172a;
      border: 1px solid #1e293b; border-radius: 6px; color: #e2e8f0;
      font-size: 13px; font-family: inherit;
    }
    .form-input:focus, .form-select:focus {
      outline: none; border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }
    .type-radio { display: flex; gap: 8px; }
    .type-radio label {
      flex: 1; padding: 8px; background: #0f172a;
      border: 1px solid #1e293b; border-radius: 6px;
      text-align: center; font-size: 12px; cursor: pointer;
      transition: all 0.15s;
    }
    .type-radio label:hover { border-color: #3b82f6; }
    .type-radio input { display: none; }
    .type-radio input:checked + span { color: #00d4ff; font-weight: 600; }
    .type-radio label:has(input:checked) {
      background: rgba(0, 212, 255, 0.08);
      border-color: #00d4ff;
    }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .actions {
      display: flex; gap: 8px; justify-content: space-between;
      margin-top: 24px;
    }
    .btn {
      padding: 10px 20px; background: transparent; color: #94a3b8;
      border: 1px solid #1e293b; border-radius: 6px; font-size: 13px;
      cursor: pointer; font-family: inherit; transition: all 0.15s;
    }
    .btn:hover { color: #e2e8f0; border-color: #334155; }
    .btn-primary {
      background: linear-gradient(135deg, #00d4ff, #0ea5e9); color: #0a0f1a;
      border: none; font-weight: 600; padding: 10px 28px;
    }
    .btn-primary:hover { opacity: 0.92; }
    /* 提示文字 */
    .help { font-size: 11px; color: #64748b; margin-top: 4px; }
  </style>
</head>
<body>
  <!-- 模糊背景（指挥台占位） -->
  <div class="bg"></div>
  <div class="bg-grid">
    <div class="bg-side"></div>
    <div class="bg-main">
      <div class="bg-card"></div>
      <div class="bg-card"></div>
      <div class="bg-card"></div>
    </div>
  </div>

  <!-- 引导浮层 -->
  <div class="overlay">
    <div class="guide">
      <div class="guide-header">
        <div class="guide-greeting">欢迎，张工！<span>👋</span></div>
        <button class="skip-btn">跳过引导</button>
      </div>
      <div class="guide-sub">让我们花 30 秒创建您的第一个 RACI 任务</div>

      <div class="step-bar">
        <span class="step-text">步骤 1 / 3</span>
        <div class="step-progress">
          <div class="step-fill" style="width: 33%;"></div>
        </div>
        <span class="step-text">33%</span>
      </div>

      <div class="form-group">
        <label class="form-label">📌 任务标题</label>
        <input type="text" class="form-input" value="排查 INC-2024-001 钓鱼邮件事件">
      </div>

      <div class="form-group">
        <label class="form-label">📝 详细描述（可选）</label>
        <textarea class="form-input" rows="3" placeholder="补充任务背景和目标...">该事件涉及 12 人，需要紧急处理 PII 数据外泄风险。</textarea>
      </div>

      <div class="two-col">
        <div class="form-group">
          <label class="form-label">任务类型</label>
          <div class="type-radio">
            <label><input type="radio" name="t" checked><span>● R 执行</span></label>
            <label><input type="radio" name="t"><span>○ A 问责</span></label>
            <label><input type="radio" name="t"><span>○ C 咨询</span></label>
            <label><input type="radio" name="t"><span>○ I 知情</span></label>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">⚡ 优先级</label>
          <select class="form-select">
            <option>P1 紧急</option>
            <option>P2 高</option>
            <option>P3 中</option>
            <option>P4 低</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">👤 分配给角色</label>
        <select class="form-select">
          <option>安全运营（SecOps）</option>
          <option>指挥官（Commander）</option>
          <option>CISO 战略官</option>
          <option>安全专家</option>
        </select>
        <div class="help">将任务分配到角色后，角色下所有成员可见</div>
      </div>

      <div class="actions">
        <button class="btn">← 上一步</button>
        <button class="btn btn-primary">下一步 →</button>
      </div>
    </div>
  </div>
</body>
</html>
