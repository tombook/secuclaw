repos:
- repo: https://github.com/pre-commit/mirrors-eslint
  rev: v8.60.0
  hooks:
  - id: eslint
    files: \\.(ts|tsx|js|jsx)$
    args: ["--max-warnings=0"]
- repo: https://github.com/pre-commit/mirrors-prettier
  rev: v3.2.0
  hooks:
  - id: prettier
    files: \\.(ts|tsx|js|jsx|json|md|yaml|yml|css)$
