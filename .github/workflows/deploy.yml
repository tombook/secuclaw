name: Deploy to Production

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm run test
      
      - name: Build project
        run: npm run build
      
      - name: Build and push Docker image
        if: ${{ secrets.DOCKER_HUB_USERNAME != '' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/secuclaw:${{ github.ref_name }}
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_HUB_TOKEN }}
      
      - name: Deploy to VPS
        if: ${{ secrets.VPS_SSH_KEY != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/secuclaw
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/secuclaw:${{ github.ref_name }}
            docker-compose down
            docker-compose up -d
            docker system prune -f
      
      - name: Send deployment notification
        uses: appleboy/telegram-action@master
        if: ${{ secrets.TELEGRAM_BOT_TOKEN != '' }}
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: ✅ SecuClaw ${{ github.ref_name }} deployed to production successfully!
