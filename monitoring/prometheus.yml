global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'secuclaw-prod'
    region: '${REGION:-local}'

scrape_configs:
  - job_name: 'secuclaw-core'
    metrics_path: '/metrics'
    scrape_interval: 10s
    static_configs:
      - targets:
          - 'core:21981'
        labels:
          service: 'secuclaw'
          component: 'core'
          env: '${ENV:-production}'

  - job_name: 'secuclaw-nginx'
    metrics_path: '/metrics'
    scrape_interval: 10s
    static_configs:
      - targets:
          - 'nginx-exporter:9113'
        labels:
          service: 'nginx'
          component: 'proxy'

  - job_name: 'secuclaw-redis'
    scrape_interval: 15s
    static_configs:
      - targets:
          - 'redis-exporter:9121'
        labels:
          service: 'redis'
          component: 'cache'

  - job_name: 'node-exporter'
    scrape_interval: 30s
    static_configs:
      - targets:
          - 'node-exporter:9100'
        labels:
          service: 'system'
          component: 'host'

  - job_name: 'cadvisor'
    scrape_interval: 15s
    static_configs:
      - targets:
          - 'cadvisor:8080'
        labels:
          service: 'system'
          component: 'container'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

rule_files:
  - '/etc/prometheus/rules/*.yml'
